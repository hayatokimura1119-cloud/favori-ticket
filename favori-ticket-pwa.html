<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FAVORI券">
<meta name="theme-color" content="#1A1712">
<title>BISTRO FAVORI｜食事券管理</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --dark: #1A1712;
    --dark2: #2A2520;
    --dark3: #3A3530;
    --cream: #F5F0E8;
    --text2: #6B6058;
    --success: #3D7A5A;
    --success-bg: #EAF4EE;
    --danger: #8B3A3A;
    --danger-bg: #F4EAEA;
    --warning: #7A5C1E;
    --warning-bg: #F4EDD8;
    --line: #06C755;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--dark); color: var(--cream); min-height: 100vh; overscroll-behavior: none; }

  header { background: var(--dark2); border-bottom: 1px solid #3A3530; padding: 14px 20px 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.2em; color: var(--gold); }
  .subtitle { font-size: 10px; letter-spacing: 0.15em; color: var(--text2); margin-top: 2px; }
  .sync-status { font-size: 10px; color: var(--text2); margin-top: 3px; }
  .sync-status.ok { color: #5AAA7A; }
  .sync-status.err { color: #C07070; }

  .tabs { display: flex; background: var(--dark2); border-bottom: 1px solid #3A3530; }
  .tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 12px; letter-spacing: 0.08em; color: var(--text2); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .content { padding: 20px 16px 60px; max-width: 480px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: var(--gold-light); margin-bottom: 16px; letter-spacing: 0.05em; }

  .scan-box { background: var(--dark2); border: 1px solid #3A3530; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .scan-box label { font-size: 11px; letter-spacing: 0.1em; color: var(--text2); display: block; margin-bottom: 10px; }
  .code-input-stack { display: flex; flex-direction: column; gap: 10px; }

  input[type="text"], input[type="number"], input[type="date"], select {
    background: var(--dark3); border: 1px solid #4A4540; border-radius: 8px;
    padding: 13px 14px; color: var(--cream); font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px; outline: none; transition: border-color 0.2s; width: 100%; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input::placeholder { color: #5A5550; font-size: 14px; }

  .btn { background: var(--gold); color: #1A1712; border: none; border-radius: 8px; padding: 14px 20px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; width: 100%; display: block; text-align: center; }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-camera { background: var(--dark3); border: 1px solid #4A4540; color: var(--cream); font-size: 14px; padding: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-outline { background: transparent; border: 1px solid #4A4540; color: var(--text2); font-size: 13px; padding: 12px; }
  .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; display: inline-block; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-line { background: var(--line); color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 500; }
  .btn-copy { background: var(--dark3); border: 1px solid #4A4540; color: var(--cream); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }

  /* QRスキャナー */
  .scanner-wrap { display: none; margin-top: 12px; border-radius: 10px; overflow: hidden; position: relative; background: #000; aspect-ratio: 1; }
  .scanner-wrap.show { display: block; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scanner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scanner-frame { width: 60%; aspect-ratio: 1; border: 2px solid var(--gold); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
  .scanner-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scan 2s ease-in-out infinite; }
  @keyframes scan { 0%,100% { top: 0; } 50% { top: calc(100% - 2px); } }
  .btn-cancel { margin-top: 8px; background: transparent; border: 1px solid #4A4540; color: var(--text2); border-radius: 8px; padding: 10px; font-size: 12px; width: 100%; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }

  .result-card { border-radius: 12px; padding: 20px; margin-top: 16px; display: none; animation: fadeIn 0.3s ease; }
  .result-card.show { display: block; }
  .result-card.valid { background: var(--success-bg); border: 1px solid #3D7A5A; }
  .result-card.used { background: var(--danger-bg); border: 1px solid var(--danger); }
  .result-card.not-found { background: var(--warning-bg); border: 1px solid #C9A84C; }
  .result-status { font-size: 16px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .result-card.valid .result-status { color: var(--success); }
  .result-card.used .result-status { color: var(--danger); }
  .result-card.not-found .result-status { color: var(--warning); }
  .result-detail { font-size: 13px; color: #2A2520; line-height: 1.9; }
  .result-detail strong { font-weight: 500; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,23,18,0.75); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 32px; height: 32px; border: 2px solid #3A3530; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 12px; color: var(--text2); letter-spacing: 0.1em; }

  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 11px; letter-spacing: 0.1em; color: var(--text2); display: block; margin-bottom: 6px; }

  /* 食事券プレビュー */
  .ticket-preview { background: linear-gradient(135deg, #1A1712 0%, #2A2218 100%); border: 1px solid var(--gold); border-radius: 12px; padding: 24px; margin-top: 16px; display: none; text-align: center; position: relative; overflow: hidden; }
  .ticket-preview.show { display: block; animation: fadeIn 0.3s ease; }
  .ticket-preview::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ticket-brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 4px; }
  .ticket-type { font-size: 10px; letter-spacing: 0.2em; color: var(--text2); margin-bottom: 16px; }
  .ticket-amount { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--cream); margin-bottom: 12px; }
  .ticket-amount span { font-size: 16px; margin-right: 4px; }
  .ticket-code { font-size: 13px; letter-spacing: 0.15em; color: var(--gold-light); margin-bottom: 6px; font-family: monospace; }
  .ticket-expiry { font-size: 10px; color: var(--text2); margin-bottom: 20px; }
  .qr-area img { width: 100px; height: 100px; border-radius: 6px; margin-bottom: 14px; background: #fff; }

  /* 共有ボタン */
  .share-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .share-label { font-size: 11px; letter-spacing: 0.1em; color: var(--text2); margin-bottom: 2px; }

  /* トースト */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2A2520; border: 1px solid var(--gold); color: var(--cream); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 食事券表示モード（URLアクセス時） */
  .ticket-view { display: none; min-height: 100vh; background: var(--dark); align-items: center; justify-content: center; padding: 20px; }
  .ticket-view.show { display: flex; flex-direction: column; }
  .ticket-view-card { background: linear-gradient(135deg, #1A1712 0%, #2A2218 100%); border: 1px solid var(--gold); border-radius: 16px; padding: 32px 24px; text-align: center; position: relative; overflow: hidden; width: 100%; max-width: 360px; margin: 0 auto; }
  .ticket-view-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ticket-view-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .tv-brand { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 4px; }
  .tv-type { font-size: 10px; letter-spacing: 0.25em; color: var(--text2); margin-bottom: 20px; }
  .tv-qr img { width: 120px; height: 120px; border-radius: 8px; background: #fff; margin-bottom: 20px; }
  .tv-amount { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; color: var(--cream); margin-bottom: 8px; }
  .tv-amount span { font-size: 18px; }
  .tv-code { font-size: 14px; letter-spacing: 0.15em; color: var(--gold-light); font-family: monospace; margin-bottom: 6px; }
  .tv-expiry { font-size: 11px; color: var(--text2); margin-bottom: 20px; }
  .tv-status { font-size: 12px; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 16px; }
  .tv-status.valid { background: rgba(61,122,90,0.2); color: #5AAA7A; border: 1px solid rgba(61,122,90,0.4); }
  .tv-status.used { background: rgba(139,58,58,0.2); color: #C07070; border: 1px solid rgba(139,58,58,0.4); }
  .tv-note { font-size: 10px; color: var(--text2); line-height: 1.6; }
  .tv-divider { height: 1px; background: #3A3530; margin: 16px 0; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat-card { background: var(--dark2); border: 1px solid #3A3530; border-radius: 10px; padding: 14px 10px; text-align: center; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--gold); }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  .ticket-list { display: flex; flex-direction: column; gap: 10px; }
  .ticket-item { background: var(--dark2); border: 1px solid #3A3530; border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .ticket-item-left { flex: 1; min-width: 0; }
  .ticket-item-code { font-size: 13px; font-family: monospace; letter-spacing: 0.1em; color: var(--gold-light); margin-bottom: 4px; }
  .ticket-item-info { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-unused { background: rgba(61,122,90,0.2); color: #5AAA7A; border: 1px solid rgba(61,122,90,0.4); }
  .badge-used { background: rgba(139,58,58,0.2); color: #C07070; border: 1px solid rgba(139,58,58,0.4); }

  .note { font-size: 11px; color: var(--text2); line-height: 1.7; background: rgba(201,168,76,0.06); border-left: 2px solid var(--gold); padding: 10px 14px; border-radius: 0 6px 6px 0; margin-top: 12px; }
  .ledger-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  #main-app { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">通信中...</div>
</div>

<!-- 食事券表示モード（?code=XXX でアクセスした時） -->
<div class="ticket-view" id="ticket-view">
  <div class="ticket-view-card" id="tv-card">
    <div class="tv-brand">BISTRO FAVORI</div>
    <div class="tv-type" id="tv-type">GIFT VOUCHER</div>
    <div class="tv-qr"><img id="tv-qr" src="" alt="QR"></div>
    <div class="tv-amount"><span>¥</span><span id="tv-amount"></span></div>
    <div class="tv-code" id="tv-code"></div>
    <div class="tv-expiry" id="tv-expiry"></div>
    <div class="tv-status" id="tv-status"></div>
    <div class="tv-divider"></div>
    <div class="tv-note">ご来店の際にスタッフへこの画面をご提示ください</div>
  </div>
</div>

<!-- 通常アプリ -->
<div id="main-app">
  <header>
    <div class="brand">BISTRO FAVORI</div>
    <div class="subtitle">食事券管理システム</div>
    <div class="sync-status" id="sync-status">Googleシートと連携中</div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('scan', this)">消込</div>
    <div class="tab" onclick="switchTab('issue', this)">発行</div>
    <div class="tab" onclick="switchTab('ledger', this)">台帳</div>
  </div>

  <div class="content">

    <!-- 消込パネル -->
    <div class="panel active" id="panel-scan">
      <p class="section-title">食事券を確認する</p>
      <div class="scan-box">
        <label>券コードを入力 または QRをスキャン</label>
        <div class="code-input-stack">
          <input type="text" id="scan-input" placeholder="例：FAV-001" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')checkTicket()">
          <button class="btn" onclick="checkTicket()">確認する</button>
          <button class="btn btn-camera" onclick="toggleScanner()">
            <span>📷</span><span id="scan-btn-label">QRコードをスキャン</span>
          </button>
        </div>
        <div class="scanner-wrap" id="scanner-wrap">
          <video id="scanner-video" autoplay playsinline muted></video>
          <div class="scanner-overlay">
            <div class="scanner-frame"><div class="scanner-line"></div></div>
          </div>
        </div>
        <button class="btn-cancel" id="btn-cancel-scan" style="display:none" onclick="stopScanner()">スキャンをキャンセル</button>
      </div>

      <div class="result-card" id="result-card">
        <div class="result-status">
          <span id="result-icon"></span>
          <span id="result-title"></span>
        </div>
        <div class="result-detail" id="result-detail"></div>
        <button class="btn btn-danger" id="btn-use" onclick="markAsUsed()" style="display:none;margin-top:14px;">この券を使用済にする</button>
      </div>
      <div class="note">「QRコードをスキャン」でカメラが起動します。カメラ許可が必要です。</div>
    </div>

    <!-- 発行パネル -->
    <div class="panel" id="panel-issue">
      <p class="section-title">食事券を発行する</p>
      <div class="scan-box">
        <div class="form-group">
          <label>種別</label>
          <select id="issue-type">
            <option value="ギフト">ギフト・プレゼント用</option>
            <option value="購入">販売・購入用</option>
            <option value="招待">スタッフ特典・招待券</option>
          </select>
        </div>
        <div class="form-group">
          <label>金額（円）</label>
          <input type="number" id="issue-amount" value="10000" step="1000" min="1000">
        </div>
        <div class="form-group">
          <label>有効期限</label>
          <input type="date" id="issue-expiry" value="2026-12-31">
        </div>
        <button class="btn" onclick="issueTicket()">発行してシートに記録する</button>
      </div>

      <!-- 発行後プレビュー -->
      <div class="ticket-preview" id="ticket-preview">
        <div class="ticket-brand">BISTRO FAVORI</div>
        <div class="ticket-type" id="prev-type">GIFT VOUCHER</div>
        <div class="qr-area"><img id="prev-qr" src="" alt="QRコード"></div>
        <div class="ticket-amount"><span>¥</span><span id="prev-amount">10,000</span></div>
        <div class="ticket-code" id="prev-code">FAV-001</div>
        <div class="ticket-expiry" id="prev-expiry">有効期限：2026年12月31日まで</div>

        <!-- 共有ボタン -->
        <div class="share-buttons">
          <div class="share-label">この食事券を共有する</div>
          <button class="btn btn-line" onclick="shareViaLine()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24-.01.37z"/></svg>
            LINEで送る
          </button>
          <button class="btn btn-copy" onclick="copyTicketUrl()">
            <span>🔗</span>
            URLをコピー
          </button>
        </div>
      </div>
    </div>

    <!-- 台帳パネル -->
    <div class="panel" id="panel-ledger">
      <div class="ledger-header">
        <p class="section-title" style="margin:0">発行済み一覧</p>
        <button class="btn btn-sm btn-outline" onclick="loadLedger()" style="width:auto">更新</button>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">発行枚数</div></div>
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">未使用</div></div>
        <div class="stat-card"><div class="stat-value">—</div><div class="stat-label">残高合計</div></div>
      </div>
      <div class="ticket-list" id="ticket-list">
        <p style="color:var(--text2);font-size:13px;text-align:center;padding:20px;">「更新」を押してください</p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzxjPIOTPu9QyTv8BExGd8J0yFb3Oxxal8m2mX7fbOjWt3yfY56EVLDbojP422Yen57ew/exec';
const BASE_URL = 'https://hayatokimura1119-cloud.github.io/favori-ticket/favori-ticket-pwa.html';

let scannerStream = null;
let scannerTimer = null;
let currentTicket = null;
let issuedCode = null;

// ===== 起動時：URLパラメータ確認 =====
window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    showTicketView(code.toUpperCase());
  }
});

async function showTicketView(code) {
  document.getElementById('main-app').style.display = 'none';
  const view = document.getElementById('ticket-view');
  view.classList.add('show');

  loading(true, '食事券を確認中...');
  try {
    const data = await callAPI({ action: 'getAll' });
    const ticket = (data.tickets || []).find(t => String(t['券コード']).trim() === code);

    if (!ticket) {
      document.getElementById('tv-card').innerHTML = `
        <div style="padding:20px;text-align:center">
          <div style="font-size:40px;margin-bottom:16px">⚠️</div>
          <div style="color:#C9A84C;font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:8px">BISTRO FAVORI</div>
          <div style="color:#C07070;font-size:15px;margin-bottom:8px">この食事券は登録されていません</div>
          <div style="color:#6B6058;font-size:12px">コード：${code}</div>
        </div>`;
      return;
    }

    const typeMap = { 'ギフト': 'GIFT VOUCHER', '購入': 'MEAL VOUCHER', '招待': 'INVITATION' };
    const today = new Date().toISOString().slice(0, 10);
    const expiry = String(ticket['有効期限'] || '').slice(0, 10);
    const amount = Number(ticket['金額'] || 0).toLocaleString();
    const isUsed = ticket['状態'] === '使用済';
    const isExpired = expiry && expiry < today;

    document.getElementById('tv-type').textContent = typeMap[ticket['種別']] || 'VOUCHER';
    document.getElementById('tv-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(code)}`;
    document.getElementById('tv-amount').textContent = amount;
    document.getElementById('tv-code').textContent = code;
    const d = new Date(expiry);
    document.getElementById('tv-expiry').textContent = `有効期限：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日まで`;

    const statusEl = document.getElementById('tv-status');
    if (isUsed) {
      statusEl.textContent = '使用済み';
      statusEl.className = 'tv-status used';
    } else if (isExpired) {
      statusEl.textContent = '有効期限切れ';
      statusEl.className = 'tv-status used';
    } else {
      statusEl.textContent = '有効';
      statusEl.className = 'tv-status valid';
    }
  } catch(e) {
    document.getElementById('tv-card').innerHTML = '<div style="padding:20px;text-align:center;color:#C07070">通信エラーが発生しました</div>';
  } finally {
    loading(false);
  }
}

// ===== ユーティリティ =====
function loading(show, text) {
  document.getElementById('loading').classList.toggle('show', show);
  if (text) document.getElementById('loading-text').textContent = text;
}
function setSyncStatus(ok, msg) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + (ok ? 'ok' : 'err');
}
async function callAPI(params) {
  const res = await fetch(API + '?' + new URLSearchParams(params));
  return await res.json();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(name, el) {
  stopScanner();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'ledger') loadLedger();
}

// ===== QRスキャナー =====
async function toggleScanner() {
  if (scannerStream) { stopScanner(); return; }
  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('scanner-video').srcObject = scannerStream;
    document.getElementById('scanner-wrap').classList.add('show');
    document.getElementById('btn-cancel-scan').style.display = 'block';
    document.getElementById('scan-btn-label').textContent = 'スキャン中...';
    scanLoop();
  } catch(e) {
    alert('カメラへのアクセスが許可されていません。\nブラウザの設定からカメラを許可してください。');
  }
}
function scanLoop() {
  const video = document.getElementById('scanner-video');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  function tick() {
    if (!scannerStream) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code && code.data) {
        document.getElementById('scan-input').value = code.data.trim().toUpperCase();
        stopScanner();
        checkTicket();
        return;
      }
    }
    scannerTimer = requestAnimationFrame(tick);
  }
  scannerTimer = requestAnimationFrame(tick);
}
function stopScanner() {
  if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
  if (scannerTimer) { cancelAnimationFrame(scannerTimer); scannerTimer = null; }
  document.getElementById('scanner-wrap').classList.remove('show');
  document.getElementById('btn-cancel-scan').style.display = 'none';
  document.getElementById('scan-btn-label').textContent = 'QRコードをスキャン';
}

// ===== 消込 =====
async function checkTicket() {
  const code = document.getElementById('scan-input').value.trim().toUpperCase();
  if (!code) return;
  loading(true, 'Googleシートを確認中...');
  try {
    const data = await callAPI({ action: 'getAll' });
    setSyncStatus(true, 'Googleシートと同期済み ✓');
    const ticket = (data.tickets || []).find(t => String(t['券コード']).trim() === code);
    showResult(code, ticket);
  } catch(e) {
    setSyncStatus(false, 'シートへの接続に失敗');
    showError();
  } finally { loading(false); }
}
function showResult(code, ticket) {
  currentTicket = ticket || null;
  const card = document.getElementById('result-card');
  const btnUse = document.getElementById('btn-use');
  card.className = 'result-card show';
  btnUse.style.display = 'none';

  if (!ticket) {
    card.classList.add('not-found');
    document.getElementById('result-icon').textContent = '⚠️';
    document.getElementById('result-title').textContent = '該当する券が見つかりません';
    document.getElementById('result-detail').innerHTML = `コード <strong>${code}</strong> は台帳に登録されていません。`;
    return;
  }
  const today = new Date().toISOString().slice(0, 10);
  const expiry = String(ticket['有効期限'] || '').slice(0, 10);
  const amount = Number(ticket['金額'] || 0).toLocaleString();

  if (ticket['状態'] === '使用済') {
    card.classList.add('used');
    document.getElementById('result-icon').textContent = '✗';
    document.getElementById('result-title').textContent = '使用済みの券です';
    document.getElementById('result-detail').innerHTML = `<strong>コード：</strong>${ticket['券コード']}<br><strong>種別：</strong>${ticket['種別']}<br><strong>金額：</strong>¥${amount}<br><strong>使用日：</strong>${ticket['使用日'] || '—'}`;
  } else if (expiry && expiry < today) {
    card.classList.add('used');
    document.getElementById('result-icon').textContent = '✗';
    document.getElementById('result-title').textContent = '有効期限切れです';
    document.getElementById('result-detail').innerHTML = `<strong>コード：</strong>${ticket['券コード']}<br><strong>有効期限：</strong>${expiry}`;
  } else {
    card.classList.add('valid');
    document.getElementById('result-icon').textContent = '✓';
    document.getElementById('result-title').textContent = '有効な食事券です';
    document.getElementById('result-detail').innerHTML = `<strong>コード：</strong>${ticket['券コード']}<br><strong>種別：</strong>${ticket['種別']}<br><strong>金額：</strong>¥${amount}<br><strong>有効期限：</strong>${expiry}`;
    btnUse.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
function showError() {
  const card = document.getElementById('result-card');
  card.className = 'result-card show not-found';
  document.getElementById('result-icon').textContent = '⚠️';
  document.getElementById('result-title').textContent = '通信エラー';
  document.getElementById('result-detail').textContent = 'ネットワーク接続を確認してください。';
  document.getElementById('btn-use').style.display = 'none';
}
async function markAsUsed() {
  if (!currentTicket) return;
  const code = currentTicket['券コード'];
  if (!confirm(`${code} を使用済みにしますか？\nこの操作は取り消せません。`)) return;
  loading(true, 'Googleシートを更新中...');
  try {
    await callAPI({ action: 'use', code });
    setSyncStatus(true, 'Googleシートを更新しました ✓');
    await checkTicket();
  } catch(e) {
    setSyncStatus(false, '更新に失敗しました');
    alert('更新に失敗しました。もう一度試してください。');
  } finally { loading(false); }
}

// ===== 発行 =====
async function issueTicket() {
  const type = document.getElementById('issue-type').value;
  const amount = parseInt(document.getElementById('issue-amount').value);
  const expiry = document.getElementById('issue-expiry').value;
  if (!amount || amount < 1000) { alert('金額を正しく入力してください。'); return; }
  if (!expiry) { alert('有効期限を入力してください。'); return; }
  loading(true, '台帳に記録中...');
  try {
    const data = await callAPI({ action: 'getAll' });
    const tickets = data.tickets || [];
    const codes = tickets.map(t => parseInt(String(t['券コード']).replace('FAV-', ''))).filter(n => !isNaN(n));
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const rand = Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const code = 'FAV-' + rand;
    const today = new Date().toISOString().slice(0, 10);
    await callAPI({ action: 'add', code, type, amount, expiry, issued: today });
    setSyncStatus(true, 'Googleシートに記録しました ✓');
    issuedCode = code;

    const typeMap = { 'ギフト': 'GIFT VOUCHER', '購入': 'MEAL VOUCHER', '招待': 'INVITATION' };
    document.getElementById('prev-type').textContent = typeMap[type] || 'VOUCHER';
    document.getElementById('prev-amount').textContent = amount.toLocaleString();
    document.getElementById('prev-code').textContent = code;
    const d = new Date(expiry);
    document.getElementById('prev-expiry').textContent = `有効期限：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日まで`;
    document.getElementById('prev-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(code)}`;
    document.getElementById('ticket-preview').classList.add('show');
    document.getElementById('ticket-preview').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {
    setSyncStatus(false, '記録に失敗しました');
    alert('記録に失敗しました。ネットワーク接続を確認してください。');
  } finally { loading(false); }
}

// ===== 共有 =====
function getTicketUrl() {
  return `${BASE_URL}?code=${issuedCode}`;
}

function shareViaLine() {
  if (!issuedCode) return;
  const url = getTicketUrl();
  const msg = `【BISTRO FAVORI 食事券】\n¥${document.getElementById('prev-amount').textContent}\n有効期限：${document.getElementById('prev-expiry').textContent.replace('有効期限：','')}\n\n下記URLから食事券をご確認ください👇\n${url}`;
  window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
}

function copyTicketUrl() {
  if (!issuedCode) return;
  const url = getTicketUrl();
  navigator.clipboard.writeText(url).then(() => {
    showToast('URLをコピーしました！');
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

// ===== 台帳 =====
async function loadLedger() {
  loading(true, 'データを読み込み中...');
  try {
    const data = await callAPI({ action: 'getAll' });
    const tickets = data.tickets || [];
    setSyncStatus(true, 'Googleシートと同期済み ✓');
    const unused = tickets.filter(t => t['状態'] === '未使用').length;
    const total = tickets.filter(t => t['状態'] === '未使用').reduce((s, t) => s + Number(t['金額'] || 0), 0);
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-value">${tickets.length}</div><div class="stat-label">発行枚数</div></div>
      <div class="stat-card"><div class="stat-value">${unused}</div><div class="stat-label">未使用</div></div>
      <div class="stat-card"><div class="stat-value">¥${Math.floor(total/10000)}万</div><div class="stat-label">残高合計</div></div>
    `;
    const list = tickets.slice().reverse().map(t => {
      const badgeClass = t['状態'] === '使用済' ? 'badge-used' : 'badge-unused';
      const amount = Number(t['金額'] || 0).toLocaleString();
      const expiry = String(t['有効期限'] || '').slice(0, 10);
      return `<div class="ticket-item"><div class="ticket-item-left"><div class="ticket-item-code">${t['券コード']}</div><div class="ticket-item-info">${t['種別']}｜¥${amount}｜${expiry}まで</div></div><span class="badge ${badgeClass}">${t['状態']}</span></div>`;
    }).join('');
    document.getElementById('ticket-list').innerHTML = list || '<p style="color:var(--text2);font-size:13px;text-align:center;padding:20px;">発行済みの券がありません</p>';
  } catch(e) {
    setSyncStatus(false, 'シートへの接続に失敗');
    document.getElementById('ticket-list').innerHTML = '<p style="color:#C07070;font-size:13px;text-align:center;padding:20px;">データの取得に失敗しました</p>';
  } finally { loading(false); }
}
